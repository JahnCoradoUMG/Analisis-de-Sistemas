services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_CLIENT_SECONDS: "300"
    # Lista simple: compatible con versiones antiguas de Compose. La API reintenta Redis al arrancar.
    depends_on:
      - redis
